# Ambiente multiplataforma (Linux/macOS/Windows) via conda.
# Uso:
#   conda env create -f environment.yml
#   conda activate toldbr-repro
#   python -m ipykernel install --user --name toldbr-repro
# Depois instale o torch conforme a aceleracao (ver README):
#   GPU (CUDA 12.4): pip install torch --index-url https://download.pytorch.org/whl/cu124
#   CPU:             pip install torch --index-url https://download.pytorch.org/whl/cpu
name: toldbr-repro
channels:
  - conda-forge
dependencies:
  - python=3.13
  - pip
  - pip:
      - -r requirements.txt
